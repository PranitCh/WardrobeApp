{% extends "base.html" %}

{% block content %}

<style>
    .upload-container {
        max-width: 600px;
        margin: auto;
        background: white;
        padding: 28px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    .upload-container h2 {
        margin-bottom: 20px;
        font-weight: 800;
        color: #0f172a;
    }

    .form-group {
        margin-bottom: 18px;
    }

    label {
        font-weight: 600;
        display: block;
        margin-bottom: 6px;
        color: #334155;
    }

    select,
    input[type="file"] {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #cbd5e1;
        outline: none;
        font-size: 0.95rem;
    }

    select:focus,
    input:focus {
        border-color: #0f172a;
    }

    .upload-btn {
        width: 100%;
        background: #0f172a;
        color: white;
        padding: 12px;
        border-radius: 12px;
        border: none;
        font-weight: 700;
        cursor: pointer;
        transition: 0.2s ease;
    }

    .upload-btn:hover {
        background: #1e293b;
        transform: translateY(-2px);
    }

    .back-btn {
        display: inline-block;
        margin-top: 14px;
        text-decoration: none;
        color: #0f172a;
        font-weight: 600;
    }

    .back-btn:hover {
        text-decoration: underline;
    }
</style>

<div class="upload-container">
    <h2>Upload Clothing</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label for="category">Category</label>
            <select name="category" id="category" required>
                <option value="">Select category</option>
                <option value="top">Top</option>
                <option value="bottom">Bottom</option>
                <option value="shoe">Shoe</option>
            </select>
        </div>

        <div class="form-group">
            <label for="subcategory">Subcategory</label>
            <select name="subcategory" id="subcategory" required>
                <option value="">Select subcategory</option>
            </select>
        </div>

        <div class="form-group">
            <label for="images">Upload Images</label>
            <input type="file" name="images" id="images" multiple required>
        </div>

        <button type="submit" class="upload-btn">Upload</button>
    </form>

    <a href="{% url 'dashboard' %}" class="back-btn">← Back to Dashboard</a>
</div>

<script>
    const subcategoryMap = {
        top: [
            { value: "shirt", label: "Shirt" },
            { value: "tshirt", label: "T-Shirt" },
            { value: "blazer", label: "Blazer" },
            { value: "hoodie", label: "Hoodie" }
        ],
        bottom: [
            { value: "trousers", label: "Trousers" },
            { value: "jeans", label: "Jeans" },
            { value: "trackpants", label: "Trackpants" },
            { value: "shorts", label: "Shorts" },
            { value: "cargos", label: "Cargos" },
            { value: "chinos", label: "Chinos" }
        ],
        shoe: [
            { value: "formal_shoes", label: "Formal Shoes" },
            { value: "loafers", label: "Loafers" },
            { value: "sneakers", label: "Sneakers" },
            { value: "slides", label: "Slides" },
            { value: "sports_shoes", label: "Sports Shoes" },
            { value: "slippers", label: "Slippers" }
        ]
    };

    const categorySelect = document.getElementById("category");
    const subcategorySelect = document.getElementById("subcategory");

    categorySelect.addEventListener("change", function () {
        const selectedCategory = this.value;

        subcategorySelect.innerHTML = '<option value="">Select subcategory</option>';

        if (!selectedCategory || !subcategoryMap[selectedCategory]) return;

        subcategoryMap[selectedCategory].forEach(function (item) {
            const option = document.createElement("option");
            option.value = item.value;
            option.textContent = item.label;
            subcategorySelect.appendChild(option);
        });
    });
</script>

{% endblock %}
