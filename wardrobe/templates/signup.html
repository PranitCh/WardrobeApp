{% extends "base.html" %}

{% block content %}
<style>
    .auth-shell {
        min-height: calc(100vh - 170px);
        display: grid;
        place-items: center;
    }

    .auth-panel {
        width: min(100%, 460px);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 28px;
    }

    .auth-panel h1 {
        margin: 0;
        color: var(--text);
        font-size: 1.8rem;
        font-weight: 800;
    }

    .auth-panel p {
        margin: 8px 0 24px;
        color: var(--muted);
    }

    .auth-panel form p {
        margin-bottom: 16px;
    }

    .auth-panel label {
        display: block;
        margin-bottom: 6px;
        color: var(--text);
        font-weight: 700;
    }

    .auth-panel input {
        width: 100%;
        min-height: 42px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        outline: none;
    }

    .auth-panel input:focus {
        border-color: var(--accent);
    }

    .auth-submit {
        width: 100%;
        border: none;
        border-radius: var(--radius);
        background: var(--primary);
        color: var(--primary-text);
        padding: 12px 16px;
        font-weight: 800;
        transition: 0.2s ease;
    }

    .auth-submit:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
    }

    .auth-switch {
        margin: 18px 0 0;
        color: var(--muted);
        text-align: center;
    }

    .auth-switch a {
        color: var(--accent);
        font-weight: 800;
        text-decoration: none;
    }

    .auth-switch a:hover {
        text-decoration: underline;
    }

    .helptext {
        display: block;
        margin-top: 6px;
        color: var(--muted);
        font-size: 0.86rem;
        line-height: 1.45;
    }

    .auth-panel ul {
        margin: -4px 0 16px;
        padding-left: 18px;
        color: var(--muted);
        font-size: 0.86rem;
    }

    .errorlist {
        margin: 0 0 14px;
        padding: 12px 14px;
        list-style: none;
        border-radius: var(--radius);
        background: var(--danger-soft);
        color: var(--danger);
        font-weight: 700;
    }
</style>

<div class="auth-shell">
    <section class="auth-panel">
        <h1>Create Account</h1>
        <p>Start saving clothes, ratings, and AI outfit preferences.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="auth-submit" type="submit">Sign Up</button>
        </form>

        <p class="auth-switch">
            Already have an account? <a href="{% url 'login' %}">Login</a>
        </p>
    </section>
</div>
{% endblock %}
